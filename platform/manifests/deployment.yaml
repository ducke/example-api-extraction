apiVersion: apps/v1
kind: Deployment
metadata:
  name: resource-broker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: resource-broker
  template:
    metadata:
      labels:
        app: resource-broker
    spec:
      serviceAccountName: resource-broker
      # kcp advertises virtual-workspace URLs under its external hostnames
      # (root.kcp.localhost etc.), which resolve to 127.0.0.1 inside pods.
      # Route them to the local-setup's traefik (pinned ClusterIP), same as
      # every other platform component does. Without this the broker cannot
      # watch the AcceptAPI/objectstorages virtual workspaces.
      hostAliases:
        - ip: 10.96.188.4
          hostnames:
            - localhost
            - portal.localhost
            - kcp.localhost
            - root.kcp.localhost
            - kcp.api.portal.localhost
      containers:
        - name: resource-broker
          image: broker
          args:
            - -kubeconfig=/kubeconfig/kubeconfig
            - -kcp-kubeconfig=/kubeconfig/kubeconfig
            - -compute-kubeconfig=/compute-kubeconfig/kubeconfig
            - -acceptapi=acceptapis
            - -requeue-interval=1s
          volumeMounts:
            - name: kubeconfig
              mountPath: /kubeconfig
              readOnly: true
            - name: compute-kubeconfig
              mountPath: /compute-kubeconfig
              readOnly: true
      volumes:
        - name: kubeconfig
          secret:
            secretName: kcp-kubeconfig
        - name: compute-kubeconfig
          configMap:
            name: compute-kubeconfig
