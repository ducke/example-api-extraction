apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: azure
resources:
  - admin-rbac.yaml
helmCharts:
  - name: krop-controller
    repo: oci://ghcr.io/opendefensecloud/charts
    version: 0.1.0
    releaseName: krop-azure
    namespace: azure
    valuesInline:
      image:
        tag: 0.1.0
      kcp:
        kubeconfigSecret:
          name: krop-kubeconfig
components:
  - ../hostaliases
