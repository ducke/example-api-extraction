# AcceptAPI: registers the krop-published gcp provider with the broker for
# region eu. (Region de is carved out for gcp-prod, the production-adapter
# chain — see providers/gcp-prod/.) apiExportName references the export the
# krop Registrar publishes from the blueprint (named <plural>.<group>).
# Created in root:gcp; requires the acceptapis binding there (setup.bash does
# both).
apiVersion: broker.platform-mesh.io/v1alpha1
kind: AcceptAPI
metadata:
  name: objectstorages.storage.example.io
spec:
  apiExportName: objectstorages.storage.example.io
  filters:
    - key: region
      valueIn: [eu]
  gvr:
    group: storage.example.io
    resource: objectstorages
    version: v1alpha1
