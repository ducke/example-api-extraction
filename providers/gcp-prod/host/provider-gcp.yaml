# provider-gcp: ODC's production CloudAPI adapter, UNCHANGED (source + CI:
# https://gitlab.opendefense.cloud/odc/cat/cloudapi/provider-gcp). Translates
# storage.opendefense.cloud/Bucket -> gcp.opendefense.cloud/GCPBucket (Crossplane
# claim) and mirrors status + a credentials secret back. Deployment/RBAC mirror
# the production Flux component (flux-odc-gcp/apps/components/gcp-provider-controller).
#
# Image: the CI image in Harbor is amd64-only (x86_64 runners) — setup.bash
# builds it locally for the host arch and sideloads it into kind, hence
# imagePullPolicy: Never.
apiVersion: v1
kind: Namespace
metadata:
  name: gcp-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: provider-gcp
  namespace: gcp-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: provider-gcp:bucket-adapter
rules:
  - apiGroups: ["storage.opendefense.cloud"]
    resources: ["buckets"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["storage.opendefense.cloud"]
    resources: ["buckets/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["gcp.opendefense.cloud"]
    resources: ["gcpbuckets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["gcp.opendefense.cloud"]
    resources: ["gcpbuckets/status"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: provider-gcp:bucket-adapter
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: provider-gcp:bucket-adapter
subjects:
  - kind: ServiceAccount
    name: provider-gcp
    namespace: gcp-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: provider-gcp
  namespace: gcp-system
  labels:
    app.kubernetes.io/name: provider-gcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: provider-gcp
  template:
    metadata:
      labels:
        app.kubernetes.io/name: provider-gcp
    spec:
      serviceAccountName: provider-gcp
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: manager
          image: provider-gcp:hackathon-local
          imagePullPolicy: Never
          args:
            - --zap-log-level=info
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
